name: fused-lasso-breaks
channels:
  - conda-forge
  - defaults
dependencies:
  - python=3.11
  - numpy>=1.26
  - scipy>=1.12
  - matplotlib>=3.8
  - pip
  - pip:
      - cvxpy>=1.4
      - tabulate>=0.9
      - pytest>=8.0
      - clarabel>=0.7   # default CVXPY open-source solver

# ── Quick-start ────────────────────────────────────────────────────────────
# conda env create -f environment.yml
# conda activate fused-lasso-breaks
# python -m simulations.N25_T5_m1
# ──────────────────────────────────────────────────────────────────────────
